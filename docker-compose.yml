services:
  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      PORT: "8000"
      CC_CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:3001","http://127.0.0.1:3001","https://compound-canvas.vercel.app","https://compoundcanvas.com","https://www.compoundcanvas.com"]'

  worker:
    build: ./api
    command: celery -A app.worker.celery_app worker --loglevel=info
    environment:
      CC_DATABASE_URL: postgresql+psycopg://compound:compound@db:5432/compound
      CC_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - db

  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: compound
      POSTGRES_PASSWORD: compound
      POSTGRES_DB: compound
    volumes:
      - compound-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine

volumes:
  compound-data:
